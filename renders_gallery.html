<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akulearn 3D Model Renders Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
            font-size: 1.1em;
        }
        
        .stat {
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        
        .controls {
            padding: 20px 30px;
            background: #f8f9fa;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
            border-bottom: 2px solid #e9ecef;
        }
        
        .filter-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        label {
            font-weight: 600;
            color: #495057;
        }
        
        select, input {
            padding: 8px 15px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        select:hover, select:focus, input:focus {
            border-color: #667eea;
            outline: none;
        }
        
        .view-toggle {
            display: flex;
            gap: 5px;
            margin-left: auto;
        }
        
        .view-btn {
            padding: 8px 15px;
            border: 2px solid #dee2e6;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .view-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .gallery {
            padding: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }
        
        .gallery.compact {
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .model-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .model-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        
        .model-views {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2px;
            background: #f8f9fa;
            padding: 10px;
        }
        
        .view-img {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: contain;
            background: white;
            border-radius: 6px;
            border: 2px solid #e9ecef;
        }
        
        .model-info {
            padding: 15px;
            background: #f8f9fa;
        }
        
        .model-name {
            font-weight: 600;
            font-size: 1.1em;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        
        .model-category {
            display: inline-block;
            padding: 4px 12px;
            background: #667eea;
            color: white;
            border-radius: 20px;
            font-size: 0.85em;
            margin-top: 5px;
        }
        
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            padding: 20px;
        }
        
        .lightbox.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .lightbox-content {
            max-width: 90%;
            max-height: 90%;
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .lightbox-image {
            max-width: 70%;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 10px;
        }
        
        .lightbox-info {
            color: white;
            max-width: 300px;
        }
        
        .lightbox-close {
            position: absolute;
            top: 30px;
            right: 30px;
            font-size: 40px;
            color: white;
            cursor: pointer;
            background: rgba(255,255,255,0.1);
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s;
        }
        
        .lightbox-close:hover {
            background: rgba(255,255,255,0.2);
            transform: rotate(90deg);
        }
        
        .view-selector {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .view-selector button {
            padding: 8px 15px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .view-selector button.active {
            background: #667eea;
            border-color: #667eea;
        }
        
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px;
            color: #6c757d;
            font-size: 1.3em;
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 1.8em; }
            .stats { flex-direction: column; gap: 10px; }
            .controls { flex-direction: column; align-items: stretch; }
            .view-toggle { margin-left: 0; justify-content: center; }
            .gallery { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎨 Akulearn 3D Model Renders</h1>
            <div class="stats">
                <div class="stat">📦 <span id="totalModels">0</span> Models</div>
                <div class="stat">🖼️ <span id="totalViews">0</span> Views</div>
                <div class="stat">📁 <span id="totalCategories">0</span> Categories</div>
            </div>
        </header>
        
        <div class="controls">
            <div class="filter-group">
                <label for="categoryFilter">Category:</label>
                <select id="categoryFilter">
                    <option value="all">All Categories</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label for="searchInput">Search:</label>
                <input type="text" id="searchInput" placeholder="Type to search...">
            </div>
            
            <div class="view-toggle">
                <button class="view-btn active" data-view="grid">Grid</button>
                <button class="view-btn" data-view="compact">Compact</button>
            </div>
        </div>
        
        <div class="gallery" id="gallery"></div>
    </div>
    
    <div class="lightbox" id="lightbox">
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        <div class="lightbox-content">
            <img class="lightbox-image" id="lightboxImage" src="" alt="">
            <div class="lightbox-info">
                <h2 id="lightboxName"></h2>
                <p id="lightboxCategory"></p>
                <div class="view-selector" id="viewSelector"></div>
            </div>
        </div>
    </div>
    
    <!-- Load gallery data -->
    <script src="gallery_data.js"></script>
    
    <script>
        // MODELS_DATA is loaded from gallery_data.js
        let MODELS_DATA = [];
        
        function loadModels() {
            // Use data from gallery_data.js
            if (typeof GALLERY_DATA !== 'undefined') {
                MODELS_DATA = GALLERY_DATA;
                console.log(`Loaded ${MODELS_DATA.length} models from gallery_data.js`);
            } else {
                console.error('gallery_data.js not loaded! Run generate_gallery_data.py first.');
                alert('Gallery data not found! Please run: python generate_gallery_data.py');
                return;
            }
            
            renderGallery();
            updateStats();
            populateCategoryFilter();
        }
        
        function renderGallery(filter = { category: 'all', search: '' }) {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            
            let filtered = MODELS_DATA;
            
            if (filter.category !== 'all') {
                filtered = filtered.filter(m => m.category === filter.category);
            }
            
            if (filter.search) {
                const search = filter.search.toLowerCase();
                filtered = filtered.filter(m => 
                    m.name.toLowerCase().includes(search) ||
                    m.category.toLowerCase().includes(search)
                );
            }
            
            if (filtered.length === 0) {
                gallery.innerHTML = '<div class="no-results">No models found matching your filters</div>';
                return;
            }
            
            filtered.forEach(model => {
                const card = document.createElement('div');
                card.className = 'model-card';
                card.onclick = () => openLightbox(model);
                
                card.innerHTML = `
                    <div class="model-views">
                        <img class="view-img" src="${model.views.front}" alt="${model.name} front" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22150%22%3E%3Crect fill=%22%23f0f0f0%22 width=%22200%22 height=%22150%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 fill=%22%23999%22%3EFront%3C/text%3E%3C/svg%3E'">
                        <img class="view-img" src="${model.views.side}" alt="${model.name} side" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22150%22%3E%3Crect fill=%22%23f0f0f0%22 width=%22200%22 height=%22150%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 fill=%22%23999%22%3ESide%3C/text%3E%3C/svg%3E'">
                        <img class="view-img" src="${model.views.top}" alt="${model.name} top" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22150%22%3E%3Crect fill=%22%23f0f0f0%22 width=%22200%22 height=%22150%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 fill=%22%23999%22%3ETop%3C/text%3E%3C/svg%3E'">
                        <img class="view-img" src="${model.views.angle}" alt="${model.name} angle" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22150%22%3E%3Crect fill=%22%23f0f0f0%22 width=%22200%22 height=%22150%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 fill=%22%23999%22%3EAngle%3C/text%3E%3C/svg%3E'">
                    </div>
                    <div class="model-info">
                        <div class="model-name">${formatName(model.name)}</div>
                        <span class="model-category">${formatCategory(model.category)}</span>
                    </div>
                `;
                
                gallery.appendChild(card);
            });
        }
        
        function formatName(name) {
            return name.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        }
        
        function formatCategory(cat) {
            return cat.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        }
        
        function updateStats() {
            document.getElementById('totalModels').textContent = MODELS_DATA.length;
            document.getElementById('totalViews').textContent = MODELS_DATA.length * 4;
            const categories = new Set(MODELS_DATA.map(m => m.category));
            document.getElementById('totalCategories').textContent = categories.size;
        }
        
        function populateCategoryFilter() {
            const select = document.getElementById('categoryFilter');
            const categories = [...new Set(MODELS_DATA.map(m => m.category))].sort();
            
            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = formatCategory(cat);
                select.appendChild(option);
            });
        }
        
        let currentModel = null;
        let currentView = 'front';
        
        function openLightbox(model) {
            currentModel = model;
            currentView = 'front';
            updateLightbox();
            document.getElementById('lightbox').classList.add('active');
        }
        
        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }
        
        function updateLightbox() {
            if (!currentModel) return;
            
            document.getElementById('lightboxImage').src = currentModel.views[currentView];
            document.getElementById('lightboxName').textContent = formatName(currentModel.name);
            document.getElementById('lightboxCategory').innerHTML = `<span class="model-category">${formatCategory(currentModel.category)}</span>`;
            
            const viewSelector = document.getElementById('viewSelector');
            viewSelector.innerHTML = '';
            
            ['front', 'side', 'top', 'angle'].forEach(view => {
                const btn = document.createElement('button');
                btn.textContent = view.charAt(0).toUpperCase() + view.slice(1);
                btn.className = view === currentView ? 'active' : '';
                btn.onclick = () => {
                    currentView = view;
                    updateLightbox();
                };
                viewSelector.appendChild(btn);
            });
        }
        
        // Event listeners
        document.getElementById('categoryFilter').addEventListener('change', (e) => {
            renderGallery({
                category: e.target.value,
                search: document.getElementById('searchInput').value
            });
        });
        
        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderGallery({
                category: document.getElementById('categoryFilter').value,
                search: e.target.value
            });
        });
        
        document.querySelectorAll('.view-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('gallery').className = 'gallery' + (btn.dataset.view === 'compact' ? ' compact' : '');
            });
        });
        
        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target.id === 'lightbox') closeLightbox();
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
        });
        
        // Initialize
        loadModels();
    </script>
</body>
</html>
