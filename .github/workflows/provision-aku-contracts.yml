name: "Provision aku-platform-contracts — fix pyproject.toml and publish.yml"

# ──────────────────────────────────────────────────────────────────────────────
# What this workflow does
# ──────────────────────────────────────────────────────────────────────────────
# The aku-platform-contracts repo has two blockers:
#
#   1. pyproject.toml is missing [build-system] — pip install from git+https fails
#      on some pip versions without it.
#   2. publish.yml uses PYPI_API_TOKEN which is not set, causing both CI runs to
#      fail. Services use git+https installs so PyPI publishing is optional, but
#      the CI failure makes the repo look broken.
#
# This workflow (manual-dispatch only) fixes both by pushing a patch commit to
# aku-platform-contracts/main and recreating the v0.1.1 tag on the fixed commit.
#
# Prerequisites
# ──────────────────────────────────────────────────────────────────────────────
# GH_PAT secret must be set with repo + workflow scopes and push access to
# oumar-code/aku-platform-contracts.
# ──────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — print what would happen without pushing"
        required: false
        default: "true"
        type: choice
        options: ["false", "true"]

jobs:
  provision:
    name: Patch aku-platform-contracts
    runs-on: ubuntu-latest
    environment: orchestration-publish

    permissions:
      contents: read  # reads this repo only; all pushes go to the target repo via GH_PAT

    env:
      GH_TOKEN: ${{ secrets.GH_PAT }}
      TARGET_REPO: oumar-code/aku-platform-contracts
      TARGET_TAG: v0.1.1

    steps:
      - name: Checkout Akulearn_docs (for reference)
        uses: actions/checkout@v4

      - name: Configure git identity
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name  "github-actions[bot]"

      - name: Clone aku-platform-contracts
        run: |
          git clone --depth 1 \
            "https://x-access-token:${GH_TOKEN}@github.com/${TARGET_REPO}.git" \
            /tmp/aku-platform-contracts
          git -C /tmp/aku-platform-contracts remote set-url origin \
            "https://x-access-token:${GH_TOKEN}@github.com/${TARGET_REPO}.git"

      - name: Apply pyproject.toml fix
        run: |
          cat > /tmp/aku-platform-contracts/pyproject.toml <<'TOML'
[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "aku-platform-contracts"
version = "0.1.1"
description = "Shared Pydantic schemas and Kafka topic constants for Aku Platform services"
authors = [{name = "Platform Architecture"}]
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["aku_contracts*"]
TOML
          echo "✅ pyproject.toml updated"

      - name: Apply publish.yml fix
        # Fix publish.yml to publish to PyPI via PYPI_API_TOKEN, with a soft
        # fallback (--skip-existing) so CI does not fail on a missing secret.
        run: |
          mkdir -p /tmp/aku-platform-contracts/.github/workflows
          cat > /tmp/aku-platform-contracts/.github/workflows/publish.yml <<'YAML'
name: Build and Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        run: |
          twine upload \
            --repository-url https://upload.pypi.org/legacy/ \
            --username __token__ \
            --password "${{ secrets.PYPI_API_TOKEN }}" \
            dist/* \
            --skip-existing || echo "⚠️  PyPI publish skipped (PYPI_API_TOKEN not set or package already published)"
YAML
          echo "✅ publish.yml updated"

      - name: Show diff
        run: git -C /tmp/aku-platform-contracts diff HEAD

      - name: Commit and push (non-dry-run only)
        if: ${{ github.event.inputs.dry_run == 'false' }}
        run: |
          git -C /tmp/aku-platform-contracts add pyproject.toml .github/workflows/publish.yml
          git -C /tmp/aku-platform-contracts commit \
            -m "fix: add [build-system], bump version to 0.1.1, fix publish workflow"
          git -C /tmp/aku-platform-contracts push origin main
          echo "✅ Pushed to main"

      - name: Move v0.1.1 tag to new commit (non-dry-run only)
        if: ${{ github.event.inputs.dry_run == 'false' }}
        run: |
          NEW_SHA=$(git -C /tmp/aku-platform-contracts rev-parse HEAD)
          echo "New commit SHA: ${NEW_SHA}"

          # Delete old tag locally and on remote, then recreate at new commit
          git -C /tmp/aku-platform-contracts tag -d "${TARGET_TAG}" 2>/dev/null || true
          git -C /tmp/aku-platform-contracts push origin ":refs/tags/${TARGET_TAG}" || true
          git -C /tmp/aku-platform-contracts tag "${TARGET_TAG}" "${NEW_SHA}"
          git -C /tmp/aku-platform-contracts push origin "${TARGET_TAG}"
          echo "✅ Tag ${TARGET_TAG} moved to ${NEW_SHA}"

      - name: Dry run summary
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo ""
          echo "════════════════════════════════════════════"
          echo "  DRY RUN — no changes pushed"
          echo "  To apply: re-run with dry_run=false"
          echo "════════════════════════════════════════════"
