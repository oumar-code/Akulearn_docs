name: Service — Integration Tests (Health Checks)

# ──────────────────────────────────────────────────────────────────────────────
# What this workflow does
# ──────────────────────────────────────────────────────────────────────────────
# Pulls the GHCR images built by "Service — Docker Build & Push", starts every
# selected service in an isolated Docker network, waits for each /health
# endpoint to return HTTP 200, then tears everything down.
#
# Architecture inside the runner:
#   aku-net (bridge)
#     ├── postgres   (shared — one instance, separate databases per service)
#     ├── redis      (shared — separate DB index per service)
#     └── <service>  (one container per service, env-configured to use above)
#
# Each service's /health endpoint is a simple liveness check that does NOT
# query the database, so the test passes even if migrations have not been run.
# The goal is to confirm that:
#   1. The Docker image starts without a fatal import/config error.
#   2. The FastAPI application binds to its configured port.
#   3. The /health route responds with {"status": "ok"}.
#
# Prerequisites
# ──────────────────────────────────────────────────────────────────────────────
# GH_PAT secret must have:
#   read:packages   — to pull images from GHCR
#
# How to trigger
# ──────────────────────────────────────────────────────────────────────────────
# Go to: Actions → "Service — Integration Tests (Health Checks)" → Run workflow
# ──────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to pull from GHCR (must already exist)"
        required: false
        default: "v0.1.1"

  # Automatically run after a successful Docker build/push
  workflow_run:
    workflows: ["Service — Docker Build & Push"]
    types: [completed]
    branches: [main]

jobs:
  integration-test:
    name: Integration Health Checks (${{ inputs.tag || 'v0.1.1' }})
    runs-on: ubuntu-latest

    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    permissions:
      contents: read   # read this (docs) repo
      packages: read   # pull images from GHCR

    env:
      GITHUB_ORG: oumar-code
      TAG: ${{ inputs.tag || 'v0.1.1' }}
      # Seconds to wait for each individual HTTP response.  Services that perform
      # DB migrations or have heavier startup logic may need more time.
      HEALTH_CHECK_TIMEOUT: "10"

    steps:
      # ── 1. Log in to GHCR (read-only — pull only) ────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      # ── 2. Create shared Docker network ──────────────────────────────────────
      - name: Create Docker network
        run: docker network create aku-net

      # ── 3. Start shared infrastructure ───────────────────────────────────────
      - name: Start PostgreSQL
        run: |
          docker run -d \
            --name postgres \
            --network aku-net \
            --env POSTGRES_USER=aku \
            --env POSTGRES_PASSWORD=aku_pass \
            --env POSTGRES_DB=aku_platform \
            postgres:16-alpine
          echo "  ✓ PostgreSQL started"

      - name: Start Redis
        run: |
          docker run -d \
            --name redis \
            --network aku-net \
            redis:7-alpine
          echo "  ✓ Redis started"

      - name: Wait for infrastructure to be ready
        run: |
          echo "Waiting for PostgreSQL..."
          for i in $(seq 1 30); do
            if docker exec postgres pg_isready -U aku -q 2>/dev/null; then
              echo "  ✓ PostgreSQL ready"
              break
            fi
            sleep 2
          done

          echo "Waiting for Redis..."
          for i in $(seq 1 20); do
            if docker exec redis redis-cli ping 2>/dev/null | grep -q PONG; then
              echo "  ✓ Redis ready"
              break
            fi
            sleep 1
          done

      # ── 4. Pull and start service containers ─────────────────────────────────
      #
      # Service ↔ port mapping — ALL services use the standard Dockerfile that
      # hardcodes port 8000 (see docs/service-templates/python-fastapi-bootstrap.md
      # Step 7: CMD ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]).
      # Each container listens on 8000 internally; we publish unique host ports so
      # the runner can reach every service independently.
      #
      #   akuai        8000  →  host 18004
      #   akudemy      8000  →  host 18000
      #   aku-edgehub  8000  →  host 18001
      #   aku-ighub    8000  →  host 18002
      #   aku-superhub 8000  →  host 18003
      #   akututor     8000  →  host 18005
      #   akuworkspace 8000  →  host 18006
      #   aku-telhone  8000  →  host 18007
      #   aku-daas     8000  →  host 18008
      #
      - name: Start service containers
        env:
          REGISTRY: ghcr.io/${{ env.GITHUB_ORG }}
        run: |
          TAG="${{ env.TAG }}"
          REGISTRY="ghcr.io/${{ env.GITHUB_ORG }}"

          # Common env for all services (non-sensitive; DB/Redis not used by /health)
          COMMON_ENV="\
            --env APP_ENV=staging \
            --env LOG_LEVEL=info \
            --env DATABASE_URL=postgresql+asyncpg://aku:aku_pass@postgres:5432/aku_platform \
            --env REDIS_URL=redis://redis:6379/0"

          start_service() {
            local name="$1"          # lowercase image name
            local container="$2"     # docker container name
            local container_port="$3"
            local host_port="$4"
            local extra_env="${5:-}"

            echo "Starting ${container}..."
            eval docker run -d \
              --name "${container}" \
              --network aku-net \
              --publish "${host_port}:${container_port}" \
              ${COMMON_ENV} \
              ${extra_env} \
              "${REGISTRY}/${name}:${TAG}" || \
            echo "  ⚠  Could not start ${container} (image may not exist yet)"
          }

          # All services use the standard Dockerfile port 8000.
          # Aku-IGHub: pass HS256 fallback so the app does not crash looking for
          # a PEM key file that is absent in the CI environment.
          start_service "akuai"        "svc-akuai"        8000 18004
          start_service "akudemy"      "svc-akudemy"      8000 18000
          start_service "aku-edgehub"  "svc-aku-edgehub"  8000 18001
          start_service "aku-ighub"    "svc-aku-ighub"    8000 18002 \
            "--env JWT_ALGORITHM=HS256 --env JWT_SECRET_KEY=test-dev-only-secret"
          start_service "aku-superhub" "svc-aku-superhub" 8000 18003
          start_service "akututor"     "svc-akututor"     8000 18005 \
            "--env AKU_AI_URL=http://svc-akuai:8000"
          start_service "akuworkspace" "svc-akuworkspace" 8000 18006 \
            "--env AKU_AI_URL=http://svc-akuai:8000"
          start_service "aku-telhone"  "svc-aku-telhone"  8000 18007 \
            "--env AKU_IGHUB_URL=http://svc-aku-ighub:8000"
          start_service "aku-daas"     "svc-aku-daas"     8000 18008 \
            "--env AKU_IGHUB_URL=http://svc-aku-ighub:8000"

          echo ""
          echo "All service containers launched. Waiting 30 s for startup..."
          sleep 30

      # ── 5. Show container status before health checks ────────────────────────
      - name: Show running containers
        run: |
          echo "════════════════════════════════════════════════════"
          echo "  Container status after startup wait"
          echo "════════════════════════════════════════════════════"
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          echo ""
          echo "  Containers NOT running:"
          for container in \
            svc-akuai svc-akudemy svc-aku-edgehub svc-aku-ighub svc-aku-superhub \
            svc-akututor svc-akuworkspace svc-aku-telhone svc-aku-daas; do
            if ! docker ps --format "{{.Names}}" | grep -q "^${container}$"; then
              echo "  ⚠  ${container} — last 20 log lines:"
              docker logs --tail 20 "${container}" 2>&1 || echo "    (no logs available)"
            fi
          done

      # ── 6. Health checks ──────────────────────────────────────────────────────
      - name: Run health checks
        id: health
        run: |
          # service_name  host_port
          declare -A SERVICES=(
            ["AkuAI"]=18004
            ["Akudemy"]=18000
            ["Aku-EdgeHub"]=18001
            ["Aku-IGHub"]=18002
            ["Aku-SuperHub"]=18003
            ["AkuTutor"]=18005
            ["AkuWorkspace"]=18006
            ["Aku-Telhone"]=18007
            ["Aku-DaaS"]=18008
          )

          PASSED=0
          SKIPPED=0
          FAILED=0
          FAILED_SVCS=()

          for svc in "${!SERVICES[@]}"; do
            port="${SERVICES[$svc]}"
            url="http://localhost:${port}/health"
            container="svc-$(echo "${svc}" | tr '[:upper:]' '[:lower:]')"

            # A container that never started means its image is not yet published
            # to GHCR.  This is expected while services are being rolled out
            # incrementally — warn but do NOT count as a failure.
            if ! docker inspect "${container}" >/dev/null 2>&1; then
              echo "  ${svc} (${url}) ... ⚠ skipped — image not yet published to GHCR"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            echo -n "  ${svc} (${url}) ... "

            for attempt in 1 2 3 4 5; do
              # curl -w "%{http_code}" always prints a 3-digit code to stdout
              # even when the connection fails (prints "000").  The `|| true`
              # prevents set -e from aborting the script on a non-zero curl
              # exit without duplicating the code via a second `echo "000"`.
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                --max-time "${HEALTH_CHECK_TIMEOUT}" "${url}" 2>/dev/null) || true
              if [[ "$HTTP_CODE" == "200" ]]; then
                echo "✅ HTTP ${HTTP_CODE}"
                PASSED=$((PASSED + 1))
                break
              fi
              if [[ $attempt -lt 5 ]]; then
                echo -n "(retry ${attempt}) "
                sleep 5
              else
                echo "❌ HTTP ${HTTP_CODE}"
                FAILED=$((FAILED + 1))
                FAILED_SVCS+=("${svc}")
              fi
            done
          done

          echo ""
          echo "────────────────────────────────────────────────────"
          echo "  Health check summary"
          echo "  ✅ Passed  : ${PASSED}"
          echo "  ⚠  Skipped : ${SKIPPED}  (image not yet in GHCR — not a failure)"
          echo "  ❌ Failed  : ${FAILED}"
          echo "────────────────────────────────────────────────────"

          if [[ ${#FAILED_SVCS[@]} -gt 0 ]]; then
            echo ""
            echo "  Failed services: ${FAILED_SVCS[*]}"
            echo ""
            echo "Health checks failed for ${FAILED} service(s) that DID start ❌"
            exit 1
          elif [[ $PASSED -eq 0 ]]; then
            echo ""
            echo "⚠  No services were tested (all images missing from GHCR)."
            echo "   Run 'Service — Docker Build & Push' first to publish images."
          else
            echo ""
            echo "All started services passed health checks ✅"
          fi

      # ── 7. Collect logs on failure ────────────────────────────────────────────
      - name: Collect container logs (on failure)
        if: failure()
        run: |
          echo "════════════════════════════════════════════════════"
          echo "  Container logs (last 50 lines each)"
          echo "════════════════════════════════════════════════════"
          for container in \
            svc-akuai svc-akudemy svc-aku-edgehub svc-aku-ighub svc-aku-superhub \
            svc-akututor svc-akuworkspace svc-aku-telhone svc-aku-daas; do
            echo ""
            echo "--- ${container} ---"
            docker logs --tail 50 "${container}" 2>&1 || echo "(container not running)"
          done

      # ── 8. Tear down ──────────────────────────────────────────────────────────
      - name: Tear down containers and network
        if: always()
        run: |
          echo "Stopping and removing containers..."
          docker rm -f \
            svc-akuai svc-akudemy svc-aku-edgehub svc-aku-ighub svc-aku-superhub \
            svc-akututor svc-akuworkspace svc-aku-telhone svc-aku-daas \
            postgres redis 2>/dev/null || true

          docker network rm aku-net 2>/dev/null || true
          echo "  ✓ Cleanup complete"

      # ── 9. Summary ────────────────────────────────────────────────────────────
      - name: Run summary
        if: always()
        run: |
          echo "════════════════════════════════════════════════════"
          echo "  Integration test complete"
          echo "  Tag     : ${{ env.TAG }}"
          echo "  Registry: ghcr.io/${{ env.GITHUB_ORG }}"
          echo "════════════════════════════════════════════════════"
