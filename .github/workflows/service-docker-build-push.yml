name: Service — Docker Build & Push

# ──────────────────────────────────────────────────────────────────────────────
# What this workflow does
# ──────────────────────────────────────────────────────────────────────────────
# For each selected Aku Platform service repo this workflow:
#   1. Clones the service repo at the specified git tag
#   2. Logs in to the GitHub Container Registry (GHCR) using GH_PAT
#   3. Builds the service Docker image (multi-stage Dockerfile already present)
#   4. Pushes the image to ghcr.io/oumar-code/<service>:<tag>  AND  :latest
#   5. Prints a per-service build/push summary
#
# Prerequisites
# ──────────────────────────────────────────────────────────────────────────────
# The GH_PAT secret (already used by the lint/format/tag workflow) must have the
# following additional scope:
#   write:packages   — to push images to GHCR
#
# If the PAT was created without that scope, regenerate it at
#   https://github.com/settings/tokens
# and add it back as the GH_PAT repository secret.
#
# How to trigger
# ──────────────────────────────────────────────────────────────────────────────
# Go to: Actions → "Service — Docker Build & Push" → Run workflow
# Fill in the inputs (or keep the defaults) and click "Run workflow".
# ──────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      services:
        description: >
          Space-separated list of service repos to build.
          Leave empty to build all allowlisted service repos.
        required: false
        default: ""
      tag:
        description: "Git tag to check out in each service repo (also used as the image tag)"
        required: false
        default: "v0.1.1"
      dry_run:
        description: "Set to 'true' to build images locally without pushing to GHCR"
        required: false
        default: "true"

jobs:
  docker-build-push:
    name: Docker Build & Push (${{ inputs.services || 'all services' }})
    runs-on: ubuntu-latest
    environment: orchestration-publish

    permissions:
      contents: read   # read this (docs) repo
      packages: write  # push images to GHCR

    env:
      GITHUB_ORG: oumar-code
      DRY_RUN: ${{ inputs.dry_run || 'false' }}

    steps:
      # ── 1. Checkout this (docs) repo to get the build script ─────────────────
      - name: Checkout Akulearn_docs
        uses: actions/checkout@v4

      - name: Resolve service allowlist
        id: allowlist
        env:
          REQUESTED_SERVICES: ${{ inputs.services || '' }}
        run: |
          source "$GITHUB_WORKSPACE/.github/allowlists/allowlist.bash"
          RESOLVED="$(resolve_allowed_repos "${REQUESTED_SERVICES}" "${AKU_SERVICE_REPOS}" "service-lane")"
          echo "services=${RESOLVED}" >> "$GITHUB_OUTPUT"
          echo "Resolved services: ${RESOLVED}"

      # ── 2. Set up Docker Buildx ───────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 3. Log in to GHCR ────────────────────────────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      # ── 4. Clone each service repo at the requested tag ───────────────────────
      - name: Clone service repos at tag
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          SERVICES: ${{ steps.allowlist.outputs.services }}
          TAG: ${{ inputs.tag || 'v0.1.1' }}
        run: |
          cd "$RUNNER_TEMP"
          mkdir -p service-workspace
          cd service-workspace

          SCAFFOLDS="$GITHUB_WORKSPACE/docs/service-migrations/scaffolds"

          for svc in $SERVICES; do
            repo_url="https://x-access-token:${GH_PAT}@github.com/${GITHUB_ORG}/${svc}.git"
            echo "Cloning ${GITHUB_ORG}/${svc} at tag ${TAG}..."

            # Clone the specific tag only (--depth 1 --branch <tag> is enough for a build)
            if git clone --depth 1 --branch "${TAG}" "${repo_url}" "${svc}" 2>&1; then
              echo "  ✓ Cloned ${svc}@${TAG}"
            else
              echo "  ⚠  Could not clone ${svc}@${TAG} — trying default branch"
              if git clone --depth 1 "${repo_url}" "${svc}" 2>&1; then
                echo "  ✓ Cloned ${svc} (default branch)"
              else
                echo "  ⚠  Could not clone ${svc} — falling back to local scaffold"
                if [[ -d "${SCAFFOLDS}/${svc}" ]]; then
                  cp -r "${SCAFFOLDS}/${svc}" "./${svc}"

                  echo "  ✓ Using scaffold for ${svc}"
                else
                  echo "  ⚠  No scaffold found for ${svc} — skipping"
                fi
              fi
            fi

            # Apply targeted scaffold patches that fix known bugs present in the
            # service repo's v0.1.1 tags.  Each patch copies a single corrected
            # file from the scaffold, which is always the source of truth for
            # shared template code.  Applying patches after the clone step keeps
            # the fix in one place (this docs repo) and propagates immediately
            # without waiting for scaffold-sync PRs to be merged in service repos.
            # The patches are idempotent: when scaffold fallback was used above the
            # files are already correct and the copy is a no-op.
            if [[ -d "./${svc}" ]]; then
              case "$svc" in
                AkuAI)
                  # AkuAI's requirements-extra.txt contains multi-GB ML packages
                  # (torch, llama-cpp-python, …) that are not needed to serve
                  # /health — the inference service is a stub until real weights
                  # are loaded.  Replace it with a no-op to keep the image small
                  # and the build fast.
                  echo "# ML extras skipped for CI scaffold build — not needed for /health" \
                    > "./${svc}/requirements-extra.txt"
                  echo "  ℹ  AkuAI: requirements-extra.txt replaced with no-op (ML deps skipped)"
                  # Fix NameError: 'OutputFormat' was referenced inside its own
                  # class body as a default value, which fails because the class
                  # is not yet bound to a name at that point.  The scaffold has
                  # the corrected version (field lives in InferenceRequest, not
                  # OutputFormat).
                  if [[ -f "${SCAFFOLDS}/AkuAI/app/schemas/inference.py" ]]; then
                    cp "${SCAFFOLDS}/AkuAI/app/schemas/inference.py" \
                       "./${svc}/app/schemas/inference.py"
                    echo "  🔧 AkuAI: patched app/schemas/inference.py (OutputFormat NameError fix)"
                  fi
                  ;;
                Aku-EdgeHub)
                  # Fix TypeError: connect() got unexpected keyword argument
                  # 'check_same_thread'.  SQLite's aiosqlite driver needs
                  # check_same_thread=False, but asyncpg (PostgreSQL) does not
                  # accept that argument at all.  The scaffold version guards
                  # the connect_arg behind a startswith("sqlite") check.
                  if [[ -f "${SCAFFOLDS}/Aku-EdgeHub/app/db/session_sqlite.py" ]]; then
                    cp "${SCAFFOLDS}/Aku-EdgeHub/app/db/session_sqlite.py" \
                       "./${svc}/app/db/session_sqlite.py"
                    echo "  🔧 Aku-EdgeHub: patched app/db/session_sqlite.py (asyncpg connect_args fix)"
                  fi
                  # Fix HTTP 404 on /health: the v0.1.1 tag was created before
                  # the @app.get("/health") route was added to app/main.py.
                  # The scaffold has the correct version with the /health endpoint.
                  if [[ -f "${SCAFFOLDS}/Aku-EdgeHub/app/main.py" ]]; then
                    cp "${SCAFFOLDS}/Aku-EdgeHub/app/main.py" \
                       "./${svc}/app/main.py"
                    echo "  🔧 Aku-EdgeHub: patched app/main.py (added /health endpoint)"
                  fi
                  ;;
                Aku-DaaS)
                  # Fix RuntimeError: Form data requires 'python-multipart' to
                  # be installed.  The /api/v1/datasets/ingest endpoint accepts
                  # multipart uploads; python-multipart was accidentally omitted
                  # from the service repo's requirements.txt.  The scaffold has
                  # the correct version.
                  if [[ -f "${SCAFFOLDS}/Aku-DaaS/requirements.txt" ]]; then
                    cp "${SCAFFOLDS}/Aku-DaaS/requirements.txt" "./${svc}/requirements.txt"
                    echo "  🔧 Aku-DaaS: patched requirements.txt (added python-multipart)"
                  fi
                  ;;
              esac
            fi
          done

      # ── 5. Build (and optionally push) each service image ────────────────────
      - name: Build and push Docker images
        env:
          SERVICES_OVERRIDE: ${{ steps.allowlist.outputs.services }}
          TAG_OVERRIDE: ${{ inputs.tag || 'v0.1.1' }}
          GHCR_USER: ${{ env.GITHUB_ORG }}
        run: |
          cp docs/service-migrations/docker-build-push.sh "$RUNNER_TEMP/service-workspace/"
          chmod +x "$RUNNER_TEMP/service-workspace/docker-build-push.sh"

          if [[ "$DRY_RUN" == "true" ]]; then
            echo "════════════════════════════════════════════════════"
            echo "  DRY RUN — images will be BUILT but NOT pushed"
            echo "════════════════════════════════════════════════════"
            # Override docker-build-push.sh behaviour: build only, skip push.
            # We achieve this by temporarily exporting DRY_RUN so the script
            # can gate the push steps.
            export DRY_RUN=true

            dry_run_fail=0
            for svc in $SERVICES_OVERRIDE; do
              dir="$RUNNER_TEMP/service-workspace/$svc"
              if [[ ! -d "$dir" ]]; then
                echo "  ⚠  $svc (directory missing — clone failed)"
                dry_run_fail=$((dry_run_fail + 1))
                continue
              fi
              if [[ ! -f "$dir/Dockerfile" ]]; then
                echo "  ⚠  $svc (Dockerfile missing)"
                dry_run_fail=$((dry_run_fail + 1))
                continue
              fi

              # Ensure git is available in the builder stage (same patch as
              # docker-build-push.sh) so pip can install git+ URL deps
              # (e.g. aku-platform-contracts, which is now public).
              if ! grep -q 'apt-get install.*\bgit\b' "${dir}/Dockerfile" 2>/dev/null; then
                if grep -q 'apt-get install.*--no-install-recommends' "${dir}/Dockerfile" 2>/dev/null; then
                  sed -i 's/\(apt-get install -y --no-install-recommends\)/\1 git/' \
                    "${dir}/Dockerfile"
                fi
              fi

              image="ghcr.io/${GHCR_USER}/$(echo "$svc" | tr '[:upper:]' '[:lower:]'):${TAG_OVERRIDE}"
              echo "  → $svc  →  $image"

              if ! docker build \
                --file "${dir}/Dockerfile" \
                --tag  "${image}" \
                "${dir}"; then
                echo "    ✗ Build FAILED for $svc"
                dry_run_fail=$((dry_run_fail + 1))
                continue
              fi
              echo "    ✓ Build OK (not pushed in dry-run mode)"
            done
            exit $dry_run_fail
          else
            cd "$RUNNER_TEMP/service-workspace"
            bash docker-build-push.sh
          fi

      # ── 6. Print run summary ──────────────────────────────────────────────────
      - name: Run summary
        if: always()
        run: |
          echo "════════════════════════════════════════════════════"
          echo "  Workflow complete"
          echo "  Services  : ${{ steps.allowlist.outputs.services }}"
          echo "  Tag       : ${{ inputs.tag || 'v0.1.1' }}"
          echo "  Dry run   : ${{ inputs.dry_run || 'false' }}"
          echo "  Registry  : ghcr.io/${{ env.GITHUB_ORG }}"
          echo "════════════════════════════════════════════════════"
