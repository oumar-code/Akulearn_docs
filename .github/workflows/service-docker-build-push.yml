name: Service — Docker Build & Push

# ──────────────────────────────────────────────────────────────────────────────
# What this workflow does
# ──────────────────────────────────────────────────────────────────────────────
# For each selected Aku Platform service repo this workflow:
#   1. Clones the service repo at the specified git tag
#   2. Logs in to the GitHub Container Registry (GHCR) using GH_PAT
#   3. Builds the service Docker image (multi-stage Dockerfile already present)
#   4. Pushes the image to ghcr.io/oumar-code/<service>:<tag>  AND  :latest
#   5. Prints a per-service build/push summary
#
# Prerequisites
# ──────────────────────────────────────────────────────────────────────────────
# The GH_PAT secret (already used by the lint/format/tag workflow) must have the
# following additional scope:
#   write:packages   — to push images to GHCR
#
# If the PAT was created without that scope, regenerate it at
#   https://github.com/settings/tokens
# and add it back as the GH_PAT repository secret.
#
# How to trigger
# ──────────────────────────────────────────────────────────────────────────────
# Go to: Actions → "Service — Docker Build & Push" → Run workflow
# Fill in the inputs (or keep the defaults) and click "Run workflow".
# ──────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      services:
        description: >
          Space-separated list of service repos to build.
          Leave empty to build all 9 services.
        required: false
        default: "AkuAI AkuTutor AkuWorkspace Akudemy Aku-EdgeHub Aku-IGHub Aku-Telhone Aku-SuperHub Aku-DaaS"
      tag:
        description: "Git tag to check out in each service repo (also used as the image tag)"
        required: false
        default: "v0.1.1"
      dry_run:
        description: "Set to 'true' to build images locally without pushing to GHCR"
        required: false
        default: "false"

jobs:
  docker-build-push:
    name: Docker Build & Push (${{ inputs.services || 'all services' }})
    runs-on: ubuntu-latest

    permissions:
      contents: read   # read this (docs) repo
      packages: write  # push images to GHCR

    env:
      GITHUB_ORG: oumar-code
      DRY_RUN: ${{ inputs.dry_run || 'false' }}

    steps:
      # ── 1. Checkout this (docs) repo to get the build script ─────────────────
      - name: Checkout Akulearn_docs
        uses: actions/checkout@v4

      # ── 2. Set up Docker Buildx ───────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 3. Log in to GHCR ────────────────────────────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      # ── 4. Clone each service repo at the requested tag ───────────────────────
      - name: Clone service repos at tag
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          SERVICES: ${{ inputs.services || 'AkuAI AkuTutor AkuWorkspace Akudemy Aku-EdgeHub Aku-IGHub Aku-Telhone Aku-SuperHub Aku-DaaS' }}
          TAG: ${{ inputs.tag || 'v0.1.1' }}
        run: |
          cd "$RUNNER_TEMP"
          mkdir -p service-workspace
          cd service-workspace

          for svc in $SERVICES; do
            repo_url="https://x-access-token:${GH_PAT}@github.com/${GITHUB_ORG}/${svc}.git"
            echo "Cloning ${GITHUB_ORG}/${svc} at tag ${TAG}..."

            # Clone the specific tag only (--depth 1 --branch <tag> is enough for a build)
            if git clone --depth 1 --branch "${TAG}" "${repo_url}" "${svc}" 2>&1; then
              echo "  ✓ Cloned ${svc}@${TAG}"
            else
              echo "  ⚠  Could not clone ${svc}@${TAG} — trying default branch"
              if git clone --depth 1 "${repo_url}" "${svc}" 2>&1; then
                echo "  ✓ Cloned ${svc} (default branch)"
              else
                echo "  ⚠  Could not clone ${svc} — skipping"
              fi
            fi
          done

      # ── 5. Build (and optionally push) each service image ────────────────────
      - name: Build and push Docker images
        env:
          SERVICES_OVERRIDE: ${{ inputs.services || 'AkuAI AkuTutor AkuWorkspace Akudemy Aku-EdgeHub Aku-IGHub Aku-Telhone Aku-SuperHub Aku-DaaS' }}
          TAG_OVERRIDE: ${{ inputs.tag || 'v0.1.1' }}
          GHCR_USER: ${{ env.GITHUB_ORG }}
        run: |
          cp docs/service-migrations/docker-build-push.sh "$RUNNER_TEMP/service-workspace/"
          chmod +x "$RUNNER_TEMP/service-workspace/docker-build-push.sh"

          if [[ "$DRY_RUN" == "true" ]]; then
            echo "════════════════════════════════════════════════════"
            echo "  DRY RUN — images will be BUILT but NOT pushed"
            echo "════════════════════════════════════════════════════"
            # Override docker-build-push.sh behaviour: build only, skip push.
            # We achieve this by temporarily exporting DRY_RUN so the script
            # can gate the push steps.
            export DRY_RUN=true

            for svc in $SERVICES_OVERRIDE; do
              dir="$RUNNER_TEMP/service-workspace/$svc"
              if [[ ! -d "$dir" ]]; then
                echo "  ⚠  $svc (directory missing — clone failed)"
                continue
              fi
              if [[ ! -f "$dir/Dockerfile" ]]; then
                echo "  ⚠  $svc (Dockerfile missing)"
                continue
              fi

              image="ghcr.io/${GHCR_USER}/$(echo "$svc" | tr '[:upper:]' '[:lower:]'):${TAG_OVERRIDE}"
              echo "  → $svc  →  $image"

              docker build \
                --file "${dir}/Dockerfile" \
                --tag  "${image}" \
                "${dir}"
              echo "    ✓ Build OK (not pushed in dry-run mode)"
            done
          else
            cd "$RUNNER_TEMP/service-workspace"
            bash docker-build-push.sh
          fi

      # ── 6. Print run summary ──────────────────────────────────────────────────
      - name: Run summary
        if: always()
        run: |
          echo "════════════════════════════════════════════════════"
          echo "  Workflow complete"
          echo "  Services  : ${{ inputs.services || 'all' }}"
          echo "  Tag       : ${{ inputs.tag || 'v0.1.1' }}"
          echo "  Dry run   : ${{ inputs.dry_run || 'false' }}"
          echo "  Registry  : ghcr.io/${{ env.GITHUB_ORG }}"
          echo "════════════════════════════════════════════════════"
