name: "Scaffold Sync — Push scaffold changes to service repos"

# ──────────────────────────────────────────────────────────────────────────────
# What this workflow does
# ──────────────────────────────────────────────────────────────────────────────
# Any edit to docs/service-migrations/scaffolds/<ServiceName>/** in this repo
# is automatically reflected in the corresponding oumar-code/<ServiceName> repo
# by opening (or updating) a pull request on branch feat/scaffold-sync.
#
# Sync mode is STRICT MIRROR:
#   - Target repo content is made to match scaffold content exactly (except .git)
#   - Files not present in scaffold are removed from the target branch
#
# Auto-trigger (on push to main):
#   - Runs when any scaffold path changes
#   - Syncs all allowlisted Aku service repos in strict mirror mode
#
# Manual trigger (workflow_dispatch):
#   - Optionally specify a space-separated list of service names, or leave
#     blank to sync all allowlisted Aku service repos
#   - Optionally enable dry_run to preview without pushing anything
#
# Prerequisites
# ──────────────────────────────────────────────────────────────────────────────
# A repo secret named GH_PAT must exist:
#   Settings → Secrets and variables → Actions → New repository secret
#   Name : GH_PAT
#   Value: A classic Personal Access Token with scopes: repo, workflow
#   (Generate at https://github.com/settings/tokens)
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
    paths:
      - "docs/service-migrations/scaffolds/**"

  workflow_dispatch:
    inputs:
      services:
        description: >
          Space-separated list of service repos to sync.
            Leave empty to sync all allowlisted Aku service repos.
        required: false
        default: ""
      dry_run:
        description: "Dry run — preview steps without pushing anything"
        required: false
        default: "true"
        type: choice
        options: ["false", "true"]

jobs:
  scaffold-sync:
    name: Sync scaffold → service repos
    runs-on: ubuntu-latest
    environment: orchestration-publish

    permissions:
      contents: read  # reads from this repo; all pushes go to service repos via PAT

    env:
      GITHUB_ORG: oumar-code
      BRANCH_NAME: feat/scaffold-sync
      SCAFFOLDS_DIR: docs/service-migrations/scaffolds
      GH_TOKEN: ${{ secrets.GH_PAT }}

    steps:
      # ── 1. Checkout Akulearn_docs (full history on push so we can diff) ───────
      - name: Checkout Akulearn_docs
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Configure git identity ────────────────────────────────────────────
      - name: Configure git identity
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name  "github-actions[bot]"

      # ── 3. Resolve runtime inputs safely for both push and workflow_dispatch ───
      - name: Resolve runtime inputs
        id: runtime
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "dry_run=${{ github.event.inputs.dry_run || 'false' }}" >> "$GITHUB_OUTPUT"
            echo "services_override=${{ github.event.inputs.services || '' }}" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
            echo "services_override=" >> "$GITHUB_OUTPUT"
          fi

      # ── 4. Determine which services to sync ──────────────────────────────────
      #
      # • workflow_dispatch with services input → use that list
      # • workflow_dispatch with empty services → use ALL allowlisted services
      # • push trigger → sync ALL allowlisted services (strict mirror policy)
      - name: Determine services to sync
        id: services
        run: |
          source "$GITHUB_WORKSPACE/.github/allowlists/allowlist.bash"
          ALLOWED="$(normalize_space_list "${AKU_SERVICE_REPOS}")"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            OVERRIDE="${{ steps.runtime.outputs.services_override }}"
            if [[ -n "$OVERRIDE" ]]; then
              RESOLVED="$(resolve_allowed_repos "$OVERRIDE" "$ALLOWED" "scaffold-lane")"
              echo "source=manual-override" >> "$GITHUB_OUTPUT"
              echo "list=${RESOLVED}" >> "$GITHUB_OUTPUT"
            else
              RESOLVED="$(resolve_allowed_repos "" "$ALLOWED" "scaffold-lane")"
              echo "source=all" >> "$GITHUB_OUTPUT"
              echo "list=${RESOLVED}" >> "$GITHUB_OUTPUT"
            fi
          else
            # Push event — strict mirror policy keeps ALL services aligned.
            RESOLVED="$(resolve_allowed_repos "" "$ALLOWED" "scaffold-lane")"
            echo "source=all-on-push" >> "$GITHUB_OUTPUT"
            echo "list=${RESOLVED}" >> "$GITHUB_OUTPUT"
          fi

      # ── 5. Early-exit if nothing to sync ─────────────────────────────────────
      - name: Skip if no services detected
        if: steps.services.outputs.list == ''
        run: |
          echo "No services to sync. Exiting."
          exit 0

      # ── 6. Sync each service ─────────────────────────────────────────────────
      - name: Sync scaffold to service repos
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          SERVICES: ${{ steps.services.outputs.list }}
          DRY_RUN: ${{ steps.runtime.outputs.dry_run }}
        run: |
          set -euo pipefail

          echo "════════════════════════════════════════════════════"
          echo "  Scaffold Sync"
          echo "  Source  : ${{ steps.services.outputs.source }}"
          echo "  Services: ${SERVICES}"
          echo "  Dry run : ${DRY_RUN}"
          echo "════════════════════════════════════════════════════"
          echo ""

          SUCCEEDED=()
          SKIPPED=()
          FAILED=()
          COMMIT_SHA="${{ github.sha }}"

          for SERVICE in $SERVICES; do
            SCAFFOLD_SRC="${GITHUB_WORKSPACE}/${SCAFFOLDS_DIR}/${SERVICE}"
            TARGET_CLONE="${RUNNER_TEMP}/${SERVICE}"

            echo "┌─ ${SERVICE} ─────────────────────────────────────────"

            # Validate scaffold directory exists
            if [[ ! -d "$SCAFFOLD_SRC" ]]; then
              echo "│  ⚠  No scaffold directory found at ${SCAFFOLD_SRC} — skipping"
              echo "└──────────────────────────────────────────────────────"
              SKIPPED+=("${SERVICE}")
              continue
            fi

            if [[ "$DRY_RUN" == "true" ]]; then
              echo "│  🔍 DRY-RUN — files that would be pushed:"
              find "${SCAFFOLD_SRC}" -type f | while read -r f; do
                echo "│    → ${f#"${SCAFFOLD_SRC}/"}"
              done
              echo "└──────────────────────────────────────────────────────"
              SKIPPED+=("${SERVICE} (dry-run)")
              continue
            fi

            # Clone the target service repo
            REPO_URL="https://x-access-token:${GH_PAT}@github.com/${GITHUB_ORG}/${SERVICE}.git"
            echo "│  Step 1: Clone ${GITHUB_ORG}/${SERVICE}"
            CLONE_OUTPUT=$(git clone --depth 1 "${REPO_URL}" "${TARGET_CLONE}" 2>&1) || {
              echo "│  ✗ Clone failed — skipping ${SERVICE}"
              echo "│    ${CLONE_OUTPUT}"
              echo "└──────────────────────────────────────────────────────"
              FAILED+=("${SERVICE}")
              continue
            }
            git -C "${TARGET_CLONE}" remote set-url origin "${REPO_URL}"

            BASE_BRANCH=$(git -C "${TARGET_CLONE}" symbolic-ref --short refs/remotes/origin/HEAD 2>/dev/null | sed 's@^origin/@@' || true)
            if [[ -z "${BASE_BRANCH}" ]]; then
              BASE_BRANCH="main"
            fi
            echo "│    Detected base branch: ${BASE_BRANCH}"

            # Create or reset the sync branch
            # Always base the branch off the repository default branch so PR diffs
            # are clean even when a service is not using `main`.
            # We use --force on push because this is a dedicated automated branch;
            # --force-with-lease is unreliable in shallow clones when the remote
            # branch was fetched separately (causes "stale info" rejection).
            echo "│  Step 2: Create/reset branch ${BRANCH_NAME}"
            if git -C "${TARGET_CLONE}" log -1 &>/dev/null; then
              if git -C "${TARGET_CLONE}" rev-parse --verify "origin/${BASE_BRANCH}" &>/dev/null; then
                git -C "${TARGET_CLONE}" checkout -B "${BRANCH_NAME}" "origin/${BASE_BRANCH}"
              else
                git -C "${TARGET_CLONE}" checkout -B "${BRANCH_NAME}" HEAD
              fi
            else
              # Empty repo — no commits yet, so HEAD is not a valid ref.
              # Create an orphan branch so we can still push scaffold files.
              git -C "${TARGET_CLONE}" checkout --orphan "${BRANCH_NAME}"
            fi

            # Strict mirror: replace target repo content with scaffold content
            # (excluding .git) and remove files that are not in scaffold.
            echo "│  Step 3: Mirror scaffold files (strict)"
            rsync -a --delete --exclude '.git/' "${SCAFFOLD_SRC}/" "${TARGET_CLONE}/"
            FILE_COUNT=$(find "${SCAFFOLD_SRC}" -type f | wc -l)
            echo "│    Mirrored ${FILE_COUNT} file(s)"
            find "${SCAFFOLD_SRC}" -type f | while read -r f; do
              echo "│    → ${f#"${SCAFFOLD_SRC}/"}"
            done

            # Guardrail: fail fast if copied workflow files look malformed.
            echo "│  Step 3b: Validate workflow files"
            MALFORMED=0
            WF_DIR="${TARGET_CLONE}/.github/workflows"
            if [[ -d "${WF_DIR}" ]]; then
              for WF in "${WF_DIR}"/*.yml "${WF_DIR}"/*.yaml; do
                [[ -e "${WF}" ]] || continue
                if grep -qE '<<<<<<<|=======|>>>>>>>' "${WF}"; then
                  echo "│  ✗ ${WF} contains merge conflict markers"
                  MALFORMED=1
                fi
                if ! grep -qE '^on:($|[[:space:]])' "${WF}"; then
                  echo "│  ✗ ${WF} missing top-level on:"
                  MALFORMED=1
                fi
                if ! grep -qE '^jobs:($|[[:space:]])' "${WF}"; then
                  echo "│  ✗ ${WF} missing top-level jobs:"
                  MALFORMED=1
                fi
              done
            fi
            if [[ "${MALFORMED}" -ne 0 ]]; then
              echo "│  ✗ Workflow validation failed — skipping ${SERVICE}"
              echo "└──────────────────────────────────────────────────────"
              FAILED+=("${SERVICE}")
              rm -rf "${TARGET_CLONE}"
              continue
            fi

            # Commit if anything changed
            echo "│  Step 4: Commit"
            git -C "${TARGET_CLONE}" add .
            if git -C "${TARGET_CLONE}" diff --cached --quiet; then
              echo "│  ℹ️  Nothing to commit — scaffold already up-to-date"
              echo "└──────────────────────────────────────────────────────"
              SKIPPED+=("${SERVICE} (no change)")
              rm -rf "${TARGET_CLONE}"
              continue
            fi

            COMMIT_SHA_SHORT="${COMMIT_SHA:0:7}"
            git -C "${TARGET_CLONE}" commit \
              -m "chore: sync scaffold from Akulearn_docs@${COMMIT_SHA_SHORT}"

            # Push the branch — force because this is a dedicated automated sync
            # branch that is always rebased onto main.
            echo "│  Step 5: Push ${BRANCH_NAME}"
            if ! git -C "${TARGET_CLONE}" push -u origin "${BRANCH_NAME}" --force; then
              echo "│  ✗ Push failed."
              echo "│    Inspect ${GITHUB_ORG}/${SERVICE}:${BRANCH_NAME} manually."
              echo "└──────────────────────────────────────────────────────"
              FAILED+=("${SERVICE}")
              rm -rf "${TARGET_CLONE}"
              continue
            fi

            # Open or update PR
            echo "│  Step 6: Open / update pull request"
            PR_BODY=$(printf '%s\n' \
              "Automated scaffold sync from [Akulearn_docs](https://github.com/oumar-code/Akulearn_docs) @ \`${COMMIT_SHA_SHORT}\`." \
              "" \
              "## What's included" \
              "This branch is a strict mirror of \`docs/service-migrations/scaffolds/${SERVICE}/\`." \
              "Files in the target repo that do not exist in the scaffold were removed." \
              "" \
              "## Why this PR was opened" \
              "A push to the \`main\` branch of Akulearn_docs changed one or more files under" \
              "\`docs/service-migrations/scaffolds/${SERVICE}/\`. This PR keeps ${SERVICE} in sync with the latest scaffold." \
              "" \
              "## Next steps" \
              "1. Review the diff and resolve any conflicts with your service-specific code" \
              "2. Merge this PR to apply the scaffold updates" \
              "3. Update the migration tracker if needed: https://github.com/oumar-code/Akulearn_docs/blob/main/docs/service-migrations/index.md" \
              "" \
              "_Automated by the \`scaffold-sync\` GitHub Actions workflow in Akulearn_docs._")

            gh pr create \
              --repo "${GITHUB_ORG}/${SERVICE}" \
              --base "${BASE_BRANCH}" \
              --head "${BRANCH_NAME}" \
              --title "chore: sync scaffold from Akulearn_docs ($(date -u '+%Y-%m-%d'))" \
              --body "${PR_BODY}" \
              2>&1 || echo "│  ℹ️  PR may already exist — it has been updated with the new commit."

            echo "│  ✅ Done"
            echo "└──────────────────────────────────────────────────────"
            SUCCEEDED+=("${SERVICE}")
            rm -rf "${TARGET_CLONE}"
          done

          # ── Summary ──────────────────────────────────────────────────────────
          echo ""
          echo "════════════════════════════════════════════════════"
          echo "  Scaffold Sync Summary"
          echo "════════════════════════════════════════════════════"
          [[ ${#SUCCEEDED[@]} -gt 0 ]] && echo "  ✅ Synced  (${#SUCCEEDED[@]}): ${SUCCEEDED[*]}"
          [[ ${#SKIPPED[@]}   -gt 0 ]] && echo "  ⏭  Skipped (${#SKIPPED[@]}):  ${SKIPPED[*]}"
          [[ ${#FAILED[@]}    -gt 0 ]] && echo "  ❌ Failed  (${#FAILED[@]}):   ${FAILED[*]}"
          echo "════════════════════════════════════════════════════"

          if [[ ${#FAILED[@]} -gt 0 ]]; then
            exit 1
          fi
