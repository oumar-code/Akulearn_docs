name: Deploy Next.js Dashboard to Vercel

on:
  push:
    branches:
      - main
    paths:
      - 'akulearn-dashboard/**'
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements.txt'
      - 'vercel.json'
      - '.vercelignore'
      - '.github/workflows/vercel-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Verify Vercel secrets are configured
        run: |
          MISSING=()
          [[ -z "${{ secrets.VERCEL_TOKEN }}" ]]      && MISSING+=("VERCEL_TOKEN")
          [[ -z "${{ secrets.VERCEL_ORG_ID }}" ]]     && MISSING+=("VERCEL_ORG_ID")
          [[ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]] && MISSING+=("VERCEL_PROJECT_ID")
          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "❌ Missing required Vercel secrets: ${MISSING[*]}"
            echo "   Go to: Settings → Secrets and variables → Actions"
            echo "   and add each missing secret (from your Vercel project dashboard)."
            exit 1
          fi
          echo "✅ All required Vercel secrets are set"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate docs/dashboard allowlist
        run: |
          source "$GITHUB_WORKSPACE/.github/allowlists/allowlist.bash"
          resolve_allowed_repos "Akulearn_docs akulearn-dashboard" "${AKU_DOCS_DASHBOARD_REPOS}" "docs-dashboard-lane" >/dev/null

      # Guard: generate package-lock.json if it was accidentally removed,
      # so the npm cache step below never fails on a missing lockfile.
      - name: Ensure package-lock.json exists
        run: |
          if [ ! -f akulearn-dashboard/package-lock.json ]; then
            echo "package-lock.json missing — generating it now"
            cd akulearn-dashboard && npm install --package-lock-only
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: akulearn-dashboard/package-lock.json

      # Cache the Next.js incremental build cache to speed up subsequent builds.
      - name: Cache Next.js build output
        uses: actions/cache@v4
        with:
          path: akulearn-dashboard/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('akulearn-dashboard/package-lock.json') }}-${{ github.run_id }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('akulearn-dashboard/package-lock.json') }}-
            nextjs-${{ runner.os }}-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install MkDocs dependencies
        run: pip install -r requirements.txt

      - name: Build MkDocs documentation
        run: mkdocs build

      - name: Copy MkDocs output into Next.js public directory
        run: |
          # Copy all site contents (including any hidden files) into public/docs/
          mkdir -p akulearn-dashboard/public/docs
          cp -r site/. akulearn-dashboard/public/docs/

      # Explicitly install dashboard dependencies so Vercel CLI always finds
      # node_modules populated — this prevents "No Next.js version detected"
      # errors that occur when Vercel's auto-install runs in the wrong context.
      - name: Install dashboard dependencies
        run: npm ci
        working-directory: akulearn-dashboard

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Initialize Vercel project link
        run: |
          rm -rf .vercel
          rm -rf akulearn-dashboard/.vercel
          mkdir -p akulearn-dashboard/.vercel
          cat > akulearn-dashboard/.vercel/project.json <<EOF
          {"orgId":"$VERCEL_ORG_ID","projectId":"$VERCEL_PROJECT_ID"}
          EOF
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Pull Vercel environment
        run: |
          set -euo pipefail
          OUT_FILE="$(mktemp)"
          if ! vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} >"${OUT_FILE}" 2>&1; then
            cat "${OUT_FILE}"
            if grep -qiE "project not found|could not retrieve project|not authorized|forbidden" "${OUT_FILE}"; then
              echo "❌ Failed to access the configured Vercel project."
              echo "   Verify that VERCEL_ORG_ID and VERCEL_PROJECT_ID belong to the same project as akulearn-dashboard."
              echo "   Re-link locally in akulearn-dashboard with: vercel link"
              echo "   Then update GitHub secrets with the resulting org/project IDs."
            fi
            exit 1
          fi
          cat "${OUT_FILE}"
        working-directory: akulearn-dashboard
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Export production env file
        run: |
          set -euo pipefail
          vercel env pull .env.production.local --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          test -f .env.production.local
        working-directory: akulearn-dashboard
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Validate Supabase environment variables
        run: |
          set -euo pipefail
          # `vercel pull` writes to Vercel-managed env files in CI.
          # Prefer production-targeted files first, but keep fallbacks.
          CANDIDATES=(
            ".vercel/.env.production.local"
            ".env.production.local"
            ".vercel/.env.local"
            ".env.local"
          )

          ENV_FILE=""
          for candidate in "${CANDIDATES[@]}"; do
            if [[ -f "$candidate" ]]; then
              ENV_FILE="$candidate"
              break
            fi
          done

          if [[ -z "$ENV_FILE" ]]; then
            echo "❌ No env file found after 'vercel pull'. Checked: ${CANDIDATES[*]}"
            echo "   Ensure 'vercel pull' succeeds and this job runs in akulearn-dashboard."
            exit 1
          fi
          echo "Using env file: $ENV_FILE"

          # Back-compat: if plain Supabase vars exist, mirror them to NEXT_PUBLIC_*
          # so browser-side auth config remains available during CI builds.
          NEXT_URL="$(grep -E '^NEXT_PUBLIC_SUPABASE_URL=' "$ENV_FILE" | tail -n1 | cut -d= -f2- || true)"
          NEXT_ANON="$(grep -E '^NEXT_PUBLIC_SUPABASE_ANON_KEY=' "$ENV_FILE" | tail -n1 | cut -d= -f2- || true)"
          PLAIN_URL="$(grep -E '^SUPABASE_URL=' "$ENV_FILE" | tail -n1 | cut -d= -f2- || true)"
          PLAIN_ANON="$(grep -E '^SUPABASE_ANON_KEY=' "$ENV_FILE" | tail -n1 | cut -d= -f2- || true)"

          HAS_NEXT_URL=0
          HAS_NEXT_ANON=0
          HAS_PLAIN_URL=0
          HAS_PLAIN_ANON=0
          grep -Eq '^NEXT_PUBLIC_SUPABASE_URL=' "$ENV_FILE" && HAS_NEXT_URL=1
          grep -Eq '^NEXT_PUBLIC_SUPABASE_ANON_KEY=' "$ENV_FILE" && HAS_NEXT_ANON=1
          grep -Eq '^SUPABASE_URL=' "$ENV_FILE" && HAS_PLAIN_URL=1
          grep -Eq '^SUPABASE_ANON_KEY=' "$ENV_FILE" && HAS_PLAIN_ANON=1

          if [[ -z "$NEXT_URL" && -n "$PLAIN_URL" ]]; then
            echo "NEXT_PUBLIC_SUPABASE_URL=$PLAIN_URL" >> "$ENV_FILE"
            echo "ℹ️ Mapped SUPABASE_URL -> NEXT_PUBLIC_SUPABASE_URL for this CI build"
          fi

          if [[ -z "$NEXT_ANON" && -n "$PLAIN_ANON" ]]; then
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$PLAIN_ANON" >> "$ENV_FILE"
            echo "ℹ️ Mapped SUPABASE_ANON_KEY -> NEXT_PUBLIC_SUPABASE_ANON_KEY for this CI build"
          fi

          MISSING=()
          grep -Eq '^NEXT_PUBLIC_SUPABASE_URL=.+$' "$ENV_FILE" || MISSING+=("NEXT_PUBLIC_SUPABASE_URL")
          grep -Eq '^NEXT_PUBLIC_SUPABASE_ANON_KEY=.+$' "$ENV_FILE" || MISSING+=("NEXT_PUBLIC_SUPABASE_ANON_KEY")

          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "❌ Missing required Supabase env vars in Vercel project: ${MISSING[*]}"
            echo "   Add them in Vercel → Project Settings → Environment Variables"
            echo "   Prefer NEXT_PUBLIC_ names for browser auth in Next.js."
            echo "   Environment scope must include: Production"
            echo "   Linked project in CI: org=$VERCEL_ORG_ID project=$VERCEL_PROJECT_ID"
            echo "   Presence in pulled file (1=yes,0=no):"
            echo "     NEXT_PUBLIC_SUPABASE_URL=$HAS_NEXT_URL"
            echo "     NEXT_PUBLIC_SUPABASE_ANON_KEY=$HAS_NEXT_ANON"
            echo "     SUPABASE_URL=$HAS_PLAIN_URL"
            echo "     SUPABASE_ANON_KEY=$HAS_PLAIN_ANON"
            echo "   Then rerun this workflow."
            exit 1
          fi

          echo "✅ Required Supabase env vars are present in Vercel environment"
        working-directory: akulearn-dashboard

      - name: Build project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: akulearn-dashboard
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_TELEMETRY_DISABLED: 1

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: akulearn-dashboard
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
