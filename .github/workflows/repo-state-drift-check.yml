name: Repo State Drift Check

on:
  schedule:
    - cron: "30 3 * * 1"
  workflow_dispatch:

jobs:
  drift-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Akulearn_docs
        uses: actions/checkout@v4

      - name: Verify orchestration repo targeting against allowlist
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          drifts = []
          allowlist_env = Path(".github/allowlists/repos.env")
          if not allowlist_env.exists():
              raise SystemExit("Missing allowlist file: .github/allowlists/repos.env")

          env_text = allowlist_env.read_text(encoding="utf-8")
          m = re.search(r'^AKU_ALLOWED_REPOS="([^"]+)"', env_text, flags=re.MULTILINE)
          if not m:
              raise SystemExit("AKU_ALLOWED_REPOS not found in allowlist env file")
          allowed = set(m.group(1).split())

          monitored_workflows = [
              "service-lint-format-tag.yml",
              "service-docker-build-push.yml",
              "service-sync-openapi.yml",
              "service-fix-requirements.yml",
              "service-integration-test.yml",
              "scaffold-sync.yml",
              "scaffold-aku-hardware.yml",
              "populate-aku-hardware.yml",
              "vercel-deploy.yml",
          ]
          workflow_paths = [Path(".github/workflows") / name for name in monitored_workflows]
          referenced = set()
          for wf in workflow_paths:
              text = wf.read_text(encoding="utf-8")
              referenced.update(re.findall(r"oumar-code/([A-Za-z0-9_.-]+)", text))
              referenced.update(re.findall(r"TARGET_REPO:\s*([A-Za-z0-9_.-]+)", text))

          out_of_scope = sorted(r for r in referenced if r and r not in allowed)
          if out_of_scope:
              drifts.append(
                  "Out-of-scope repos referenced by workflows: " + ", ".join(out_of_scope)
              )

          required = {"Akulearn_docs", "aku-platform-contracts", "Aku-Hardware", "akulearn-dashboard"}
          missing_required = sorted(r for r in required if r not in allowed)
          if missing_required:
              drifts.append(
                  "Required orchestration repos missing from allowlist: " + ", ".join(missing_required)
              )

          if drifts:
              print("❌ Repo-state drift detected:")
              for item in drifts:
                  print(f" - {item}")
              raise SystemExit(1)

          print("✅ No tracked repo-state drift detected.")
          PY
