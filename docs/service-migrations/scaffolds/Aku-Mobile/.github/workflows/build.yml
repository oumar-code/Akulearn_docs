name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "KOTLIN MULTIPLATFORM"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Belt-and-suspenders: ensure gradlew is executable even if the git
      # executable bit is lost in a future commit.
      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build shared module (Android)
        run: ./gradlew :shared:assembleDebug

      - name: Build Android app (debug APK)
        run: ./gradlew :androidApp:assembleDebug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: akulearn-debug-apk
          path: "KOTLIN MULTIPLATFORM/androidApp/build/outputs/apk/debug/*.apk"
          retention-days: 14

  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: "KOTLIN MULTIPLATFORM"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build iOS framework
        run: ./gradlew :shared:linkDebugFrameworkIosArm64

  release-apk:
    name: Release APK
    # Only runs when a version tag (e.g. v0.1.0) is pushed.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-android
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "KOTLIN MULTIPLATFORM"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build release APK (unsigned)
        run: ./gradlew :androidApp:assembleRelease

      # Attaches the APK to the GitHub Release created by the tag push.
      # Users can download and sideload this APK directly from the Releases page.
      - name: Publish release APK to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: "KOTLIN MULTIPLATFORM/androidApp/build/outputs/apk/release/*.apk"
          generate_release_notes: true
