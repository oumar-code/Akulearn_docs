# =============================================================================
# Aku Platform — Kubernetes Secret Templates
# =============================================================================
# THIS FILE CONTAINS PLACEHOLDER VALUES ONLY.
# NEVER commit real credentials to source control.
#
# Usage:
#   Option A — Apply this file after replacing every CHANGE_ME placeholder:
#     kubectl apply -f docs/deployment/k8s/secrets.yaml
#
#   Option B (recommended for production) — Create each secret imperatively:
#     kubectl create secret generic akuai-secret \
#       --namespace aku-platform \
#       --from-literal=DATABASE_URL="postgresql+asyncpg://..." \
#       --from-literal=REDIS_URL="redis://..." \
#       --from-literal=AKUAI_API_SECRET="..."
#
#   Option C — Use a secrets manager (HashiCorp Vault, AWS Secrets Manager,
#     GCP Secret Manager) and inject values via the External Secrets Operator
#     or a Vault Agent sidecar.
#
# All Secret values must be base64-encoded when embedded in YAML.
# Use:  echo -n 'my-value' | base64
# =============================================================================

# ── Namespace ─────────────────────────────────────────────────────────────────
# Apply namespace first: kubectl apply -f namespace.yaml
# All secrets below belong to the aku-platform namespace.

---
# =============================================================================
# AkuAI  (references: akuai-secret)
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: akuai-secret
  namespace: aku-platform
  labels:
    app: akuai
    app.kubernetes.io/part-of: aku-platform
type: Opaque
stringData:
  # PostgreSQL — inference logs & audit trail
  # Format: postgresql+asyncpg://<user>:<password>@<host>:<port>/<db>
  DATABASE_URL: "postgresql+asyncpg://akuai:CHANGE_ME@postgres:5432/aku_platform"
  # Redis DB 2 — response cache & rate limiting
  REDIS_URL: "redis://redis:6379/2"
  # Internal service-to-service API secret (required by all AkuAI callers)
  AKUAI_API_SECRET: "CHANGE_ME_in_production"
  # HuggingFace token — only needed for gated/private model downloads
  HUGGINGFACE_TOKEN: ""
  # Hosted LLM provider keys — only needed if routing inference to the cloud
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  GOOGLE_API_KEY: ""

---
# =============================================================================
# Akudemy  (references: akudemy-secret)
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: akudemy-secret
  namespace: aku-platform
  labels:
    app: akudemy
    app.kubernetes.io/part-of: aku-platform
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://akudemy:CHANGE_ME@postgres:5432/aku_platform"
  # Redis DB 3 — content-sync cache
  REDIS_URL: "redis://redis:6379/3"
  # Shared secret for /content/sync — must match AKUDEMY_EDGE_HUB_SHARED_SECRET in EdgeHub
  EDGE_HUB_SHARED_SECRET: "CHANGE_ME_in_production"
  # Polygon / Web3 — blockchain credential issuance
  POLYGON_RPC_URL: "https://polygon-amoy.g.alchemy.com/v2/YOUR_ALCHEMY_KEY"
  POLYGON_NETWORK: "amoy"
  # Store issuer private key in a secrets manager; never hardcode in production
  POLYGON_PRIVATE_KEY: "0xCHANGE_ME"
  POLYGON_ISSUER_ADDRESS: "0xCHANGE_ME"
  CREDENTIAL_CONTRACT_ADDRESS: "0xCHANGE_ME"
  # Supabase (optional — only if Akudemy uses Supabase for auth / storage)
  SUPABASE_URL: "https://YOUR_PROJECT.supabase.co"
  SUPABASE_SERVICE_ROLE_KEY: "CHANGE_ME"

---
# =============================================================================
# Aku-EdgeHub  (references: aku-edgehub-secret)
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: aku-edgehub-secret
  namespace: aku-platform
  labels:
    app: aku-edgehub
    app.kubernetes.io/part-of: aku-platform
type: Opaque
stringData:
  # SQLite for offline/edge mode; PostgreSQL for cloud-connected staging/production.
  # Override with postgresql+asyncpg://... when deploying as a cloud service.
  DATABASE_URL: "sqlite+aiosqlite:////data/edge_hub.db"
  # Redis DB 4
  REDIS_URL: "redis://redis:6379/4"
  # API keys for calling upstream services
  AKUDEMY_API_KEY: "CHANGE_ME_in_production"
  AKUAI_API_KEY: "CHANGE_ME_in_production"

---
# =============================================================================
# Aku-IGHub  (references: aku-ighub-secret)
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: aku-ighub-secret
  namespace: aku-platform
  labels:
    app: aku-ighub
    app.kubernetes.io/part-of: aku-platform
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://ighub:CHANGE_ME@postgres:5432/aku_platform"
  # Redis DB 5 — idempotency store
  REDIS_URL: "redis://redis:6379/5"
  # JWT — use RS256 (asymmetric) in production.
  # For RS256: mount the private key as a volume and set JWT_PRIVATE_KEY_PATH instead.
  # For HS256 (dev/staging only):
  IGHUB_JWT_SECRET: "CHANGE_ME_min_32_chars_in_production"
  JWT_ALGORITHM: "HS256"

---
# =============================================================================
# Aku-SuperHub  (references: aku-superhub-secret)
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: aku-superhub-secret
  namespace: aku-platform
  labels:
    app: aku-superhub
    app.kubernetes.io/part-of: aku-platform
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://superhub:CHANGE_ME@postgres:5432/aku_platform"
  # Redis DB 6
  REDIS_URL: "redis://redis:6379/6"
  # JWT symmetric secret (HS256); use RS256 + key file in production
  JWT_SECRET_KEY: "CHANGE_ME_min_32_chars_in_production"
  # Inter-service API keys
  AKU_PLATFORM_API_KEY: "CHANGE_ME_in_production"
  ML_PIPELINE_API_KEY: "CHANGE_ME_in_production"

---
# =============================================================================
# AkuTutor  (references: akututor-secret)
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: akututor-secret
  namespace: aku-platform
  labels:
    app: akututor
    app.kubernetes.io/part-of: aku-platform
type: Opaque
stringData:
  # AkuTutor has no database of its own — it delegates all inference to AkuAI.
  # These are included for completeness / future session persistence.
  DATABASE_URL: "postgresql+asyncpg://akututor:CHANGE_ME@postgres:5432/aku_platform"
  REDIS_URL: "redis://redis:6379/9"

---
# =============================================================================
# AkuWorkspace  (references: akuworkspace-secret)
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: akuworkspace-secret
  namespace: aku-platform
  labels:
    app: akuworkspace
    app.kubernetes.io/part-of: aku-platform
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://workspace:CHANGE_ME@postgres:5432/aku_platform"
  # Redis DB 7 — per-user context (contextual memory)
  REDIS_URL: "redis://redis:6379/7"

---
# =============================================================================
# Aku-Telhone  (references: aku-telhone-secret)
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: aku-telhone-secret
  namespace: aku-platform
  labels:
    app: aku-telhone
    app.kubernetes.io/part-of: aku-platform
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://telhone:CHANGE_ME@postgres:5432/aku_platform"
  REDIS_URL: "redis://redis:6379/10"
  # SM-DP+ / OTA provisioning credentials
  SMDP_API_KEY: "CHANGE_ME"
  OTA_PLATFORM_API_KEY: "CHANGE_ME"
  # Service-to-service API key for calling Aku-IGHub
  AKU_IGHUB_API_KEY: "CHANGE_ME_in_production"
  # JWT bearer token verification.
  # Production (RS256): mount the public key PEM as a volume and set JWT_PUBLIC_KEY_PATH
  #   in the ConfigMap; remove JWT_SECRET_KEY from this Secret.
  # Dev/staging (HS256): set JWT_ALGORITHM=HS256 in the ConfigMap and add JWT_SECRET_KEY here.
  JWT_PUBLIC_KEY_PATH: "/secrets/jwt_public.pem"
  JWT_ALGORITHM: "RS256"

---
# =============================================================================
# Aku-DaaS  (references: aku-daas-secret)
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: aku-daas-secret
  namespace: aku-platform
  labels:
    app: aku-daas
    app.kubernetes.io/part-of: aku-platform
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://daas:CHANGE_ME@postgres:5432/aku_platform"
  # Redis DB 8 — pipeline status pub/sub & distributed lock
  REDIS_URL: "redis://redis:6379/8"
  # IGHub service-to-service token (scoped to metadata:publish)
  IGHUB_SERVICE_TOKEN: "CHANGE_ME_service_token"
  # Object storage (AWS S3 or MinIO)
  AWS_ACCESS_KEY_ID: "CHANGE_ME"
  AWS_SECRET_ACCESS_KEY: "CHANGE_ME"
  # Set to a MinIO endpoint for local dev; leave empty to use AWS S3 in production
  AWS_ENDPOINT_URL: ""
