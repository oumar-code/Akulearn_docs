# ── Aku-IGHub — Global API Gateway ───────────────────────────────────────────
# Tier 3 global gateway: cross-border metadata exchange, Aku Coin financial
# clearing (idempotent), policy/compliance enforcement, and the global credential
# registry.  All Tier 1 & 2 hub traffic routes through this service.
#
# Container port : 8000
# Health endpoint: GET /health

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aku-ighub-config
  namespace: aku-platform
  labels:
    app: aku-ighub
    app.kubernetes.io/part-of: aku-platform
data:
  APP_ENV: "staging"
  LOG_LEVEL: "info"
  APP_PORT: "8000"
  AKU_DAAS_URL: "http://aku-daas.aku-platform.svc.cluster.local"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aku-ighub
  namespace: aku-platform
  labels:
    app: aku-ighub
    app.kubernetes.io/part-of: aku-platform
    app.kubernetes.io/version: v0.1.1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aku-ighub
  template:
    metadata:
      labels:
        app: aku-ighub
        app.kubernetes.io/version: v0.1.1
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: aku-ighub
          image: ghcr.io/oumar-code/aku-ighub:v0.1.1
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: aku-ighub-config
            - secretRef:
                name: aku-ighub-secret
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: aku-ighub
  namespace: aku-platform
  labels:
    app: aku-ighub
    app.kubernetes.io/part-of: aku-platform
spec:
  type: ClusterIP
  selector:
    app: aku-ighub
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
