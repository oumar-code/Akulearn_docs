<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akulearn - 3D Gallery</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container { max-width: 1200px; margin: 0 auto; }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        header h1 { font-size: 42px; margin-bottom: 10px; }
        header p { font-size: 18px; opacity: 0.9; }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
        }
        
        .card:hover { transform: translateY(-5px); }
        .card h3 { font-size: 20px; color: #333; margin-bottom: 10px; }
        .card p { font-size: 14px; color: #666; margin-bottom: 15px; }
        
        .btns { display: flex; gap: 10px; }
        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
            background: #667eea;
            color: white;
            transition: all 0.3s;
        }
        .btn:hover { background: #5568d3; }
        .btn.secondary { background: #f0f0f0; color: #333; }
        .btn.secondary:hover { background: #e0e0e0; }
        
        @media (max-width: 768px) {
            header h1 { font-size: 32px; }
            .gallery { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 Akulearn 3D Animation Gallery</h1>
            <p>Priority 0 Biology Animations</p>
        </header>
        
        <div class="gallery">
            
        <div class="card">
            <h3>Circulatory System</h3>
            <p>Heart pulsing with blood flow</p>
            <div class="btns">
                <a href="circulatory_system_viewer.html" target="_blank" class="btn">🎬 3D Viewer</a>
                <a href="circulatory_system_ar_viewer.html" target="_blank" class="btn secondary">📱 AR</a>
            </div>
        </div>
        <div class="card">
            <h3>Respiratory System</h3>
            <p>Breathing cycles with lung expansion</p>
            <div class="btns">
                <a href="respiratory_system_viewer.html" target="_blank" class="btn">🎬 3D Viewer</a>
                <a href="respiratory_system_ar_viewer.html" target="_blank" class="btn secondary">📱 AR</a>
            </div>
        </div>
        <div class="card">
            <h3>Digestive System</h3>
            <p>Food movement with peristalsis</p>
            <div class="btns">
                <a href="digestive_system_viewer.html" target="_blank" class="btn">🎬 3D Viewer</a>
                <a href="digestive_system_ar_viewer.html" target="_blank" class="btn secondary">📱 AR</a>
            </div>
        </div>
        </div>
    </div>
</body>
</html>
