<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Respiratory System - 3D Viewer</title>
    
    <script src="https://cdn.jsdelivr.net/npm/three@r160/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@r160/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@r160/examples/js/controls/OrbitControls.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
        }
        
        #viewer { position: relative; width: 100vw; height: 100vh; }
        #canvas { width: 100%; height: 100%; display: block; }
        
        .panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            z-index: 100;
            min-width: 300px;
        }
        
        .panel h2 { margin: 0 0 15px 0; color: #333; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
        .panel p { font-size: 13px; color: #666; margin: 5px 0; }
        
        .controls { margin-top: 15px; }
        .control-group { margin-bottom: 12px; }
        .control-group label { display: block; font-size: 12px; color: #555; margin-bottom: 5px; }
        
        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #ddd;
            outline: none;
        }
        
        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        button {
            flex: 1;
            min-width: 70px;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #667eea;
            color: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s;
        }
        
        button:hover { background: #5568d3; transform: translateY(-2px); }
        button.secondary { background: #f0f0f0; color: #333; }
        button.secondary:hover { background: #e0e0e0; }
        
        .info { margin-top: 12px; padding: 10px; background: #f8f9fa; border-radius: 6px; font-size: 12px; }
        .info-item { display: flex; justify-content: space-between; margin: 4px 0; }
        
        .loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(255,255,255,0.95); padding: 30px; border-radius: 12px; text-align: center; z-index: 200; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .ar-button { position: absolute; bottom: 20px; right: 20px; padding: 12px 20px; background: rgba(255,255,255,0.95); border: 2px solid #667eea; border-radius: 8px; color: #667eea; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .ar-button:hover { background: #667eea; color: white; }
    </style>
</head>
<body>
    <div id="viewer">
        <div id="canvas"></div>
        
        <div class="panel">
            <h2>Respiratory System</h2>
            <p>Breathing cycles with lung expansion</p>
            
            <div class="info">
                <div class="info-item"><span>Duration:</span><span>40s</span></div>
                <div class="info-item"><span>Time:</span><span id="time">0.0s</span></div>
                <div class="info-item"><span>FPS:</span><span id="fps">60</span></div>
            </div>
            
            <div class="controls">
                <div class="control-group">
                    <label>Speed: <span id="speed">1.0x</span></label>
                    <input type="range" id="speedSlider" min="0.1" max="3" step="0.1" value="1.0">
                </div>
                
                <div class="control-group">
                    <label>Progress: <span id="progress">0%</span></label>
                    <input type="range" id="progressSlider" min="0" max="100" step="1" value="0">
                </div>
                
                <div class="buttons">
                    <button id="playBtn">▶ Play</button>
                    <button id="pauseBtn">⏸ Pause</button>
                    <button id="resetBtn" class="secondary">↻ Reset</button>
                </div>
                
                <div class="buttons">
                    <button id="loopBtn">🔁 Loop</button>
                    <button id="wireBtn" class="secondary">📐 Wire</button>
                </div>
            </div>
        </div>
        
        <button class="ar-button" id="arBtn">📱 View in AR</button>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Loading 3D model...</p>
        </div>
    </div>
    
    <script>
        const MODEL = '../generated_assets/animated/biology_models/respiratory_system_animated.glb';
        const DURATION = 40;
        
        let scene, camera, renderer, controls, mixer, model;
        let isPlaying = false, loopMode = true, wireframe = false;
        let currentTime = 0;
        let fps60 = 0;
        
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf0f0f0);
            
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(5, 5, 5);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas').appendChild(renderer.domElement);
            
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            
            const light1 = new THREE.AmbientLight(0xffffff, 0.6);
            const light2 = new THREE.DirectionalLight(0xffffff, 0.8);
            light2.position.set(5, 10, 5);
            const light3 = new THREE.DirectionalLight(0xffffff, 0.4);
            light3.position.set(-5, 5, -5);
            
            scene.add(light1);
            scene.add(light2);
            scene.add(light3);
            scene.add(new THREE.GridHelper(10, 10));
            
            loadModel();
            setupControls();
            animate();
        }
        
        function loadModel() {
            const loader = new THREE.GLTFLoader();
            loader.load(
                MODEL,
                (gltf) => {
                    model = gltf.scene;
                    scene.add(model);
                    
                    const box = new THREE.Box3().setFromObject(model);
                    const center = box.getCenter(new THREE.Vector3());
                    model.position.sub(center);
                    
                    const size = box.getSize(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z);
                    model.scale.multiplyScalar(3 / maxDim);
                    
                    if (gltf.animations.length > 0) {
                        mixer = new THREE.AnimationMixer(model);
                        const action = mixer.clipAction(gltf.animations[0]);
                        action.setLoop(THREE.LoopRepeat);
                        action.clampWhenFinished = true;
                    }
                    
                    document.getElementById('loading').style.display = 'none';
                },
                undefined,
                (error) => {
                    document.getElementById('loading').innerHTML = '<p style="color:red;">Error loading model</p>';
                }
            );
        }
        
        function setupControls() {
            document.getElementById('playBtn').onclick = () => {
                if (mixer) {
                    const actions = mixer._actions;
                    if (actions.length > 0) {
                        actions[0].paused = false;
                        isPlaying = true;
                    }
                }
            };
            
            document.getElementById('pauseBtn').onclick = () => {
                if (mixer) {
                    const actions = mixer._actions;
                    if (actions.length > 0) {
                        actions[0].paused = true;
                        isPlaying = false;
                    }
                }
            };
            
            document.getElementById('resetBtn').onclick = () => {
                currentTime = 0;
                document.getElementById('progressSlider').value = 0;
            };
            
            document.getElementById('speedSlider').oninput = (e) => {
                const speed = parseFloat(e.target.value);
                document.getElementById('speed').textContent = speed.toFixed(1) + 'x';
                if (mixer) {
                    mixer.timeScale = speed;
                }
            };
            
            document.getElementById('progressSlider').oninput = (e) => {
                currentTime = (DURATION * parseInt(e.target.value)) / 100;
            };
            
            document.getElementById('loopBtn').onclick = (e) => {
                loopMode = !loopMode;
                e.target.textContent = loopMode ? '🔁 Loop' : '⏸ Once';
            };
            
            document.getElementById('wireBtn').onclick = () => {
                wireframe = !wireframe;
                if (model) {
                    model.traverse((child) => {
                        if (child.isMesh) {
                            child.material.wireframe = wireframe;
                        }
                    });
                }
            };
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = 1 / 60;
            if (mixer && isPlaying) {
                mixer.update(delta);
                currentTime += delta;
                if (currentTime >= DURATION) {
                    currentTime = 0;
                    if (!loopMode) isPlaying = false;
                }
            }
            
            document.getElementById('time').textContent = currentTime.toFixed(1) + 's';
            document.getElementById('progress').textContent = Math.round((currentTime / DURATION) * 100) + '%';
            document.getElementById('progressSlider').value = (currentTime / DURATION) * 100;
            document.getElementById('fps').textContent = Math.round(1 / delta);
            
            controls.update();
            renderer.render(scene, camera);
        }
        
        document.getElementById('arBtn').onclick = () => {
            window.open('Respiratory System_ar_viewer.html', '_blank');
        };
        
        init();
    </script>
</body>
</html>
